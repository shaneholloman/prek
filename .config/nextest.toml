[profile.ci-core]
status-level = "skip"
final-status-level = "slow"
failure-output = "immediate"
fail-fast = false
test-threads = 8

[profile.ci-language]
inherits = "ci-core"
default-filter = "binary_id(prek::languages)"

[[profile.ci-language.overrides]]
# LuaRocks can hit a race condition when multiple processes are installing the same package.
filter = "test(lua::)"
threads-required = "num-test-threads"

[[profile.ci-language.overrides]]
platform = 'cfg(windows)'
filter = "test(perl::)"
threads-required = "num-test-threads"

[[profile.ci-language.overrides]]
# R package installs can share user-level cache and lock state.
filter = "test(/^r::/)"
threads-required = "num-test-threads"
